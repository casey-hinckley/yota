{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <h1 class="mb-4">Add Metrics for {{ athlete.name }}</h1>
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="attendance" name="attendance" checked>
                            <label class="form-check-label" for="attendance">
                                Present at practice
                            </label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="stops" class="form-label">Number of stops during practice</label>
                        <input type="number" class="form-control" id="stops" name="stops" min="0" value="0">
                    </div>

                    <div class="mb-3">
                        <label for="effort" class="form-label">Effort Score (1-5)</label>
                        <select class="form-select" id="effort" name="effort" required>
                            <option value="1">1 - Poor</option>
                            <option value="2">2 - Below Average</option>
                            <option value="3">3 - Average</option>
                            <option value="4">4 - Above Average</option>
                            <option value="5">5 - Excellent</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="attitude" class="form-label">Attitude Score (1-5)</label>
                        <select class="form-select" id="attitude" name="attitude" required>
                            <option value="1">1 - Poor</option>
                            <option value="2">2 - Below Average</option>
                            <option value="3">3 - Average</option>
                            <option value="4">4 - Above Average</option>
                            <option value="5">5 - Excellent</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Additional Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Save Metrics</button>
                    <a href="{{ url_for('athlete_detail', athlete_id=athlete.id) }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
